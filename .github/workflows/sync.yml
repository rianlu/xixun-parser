name: Telegram 戏讯解析同步

on:
  schedule:
    # 每 5 分钟检查一次机器人消息 (GitHub 定时任务)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # 允许手动触发测试

jobs:
  check-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: 获取项目代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install requests

      - name: 🤖 检查并处理 Telegram 消息
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          # 将当前目录加入 Python 搜索路径，确保 cli.py 能找到 backend 文件夹
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python << 'EOF'
          import os
          import requests
          import subprocess
          import json
          import sys

          TOKEN = os.getenv("TG_TOKEN")
          # 1. 获取最近的消息
          try:
              resp = requests.get(f"https://api.telegram.org/bot{TOKEN}/getUpdates", timeout=10).json()
          except Exception as e:
              print(f"请求 Telegram API 失败: {e}")
              sys.exit(0)
          
          if resp.get("ok") and resp.get("result"):
              for update in resp["result"]:
                  update_id = update["update_id"]
                  message = update.get("message", {})
                  text = message.get("text", "")
                  chat_id = message.get("chat", {}).get("id")
                  
                  # 识别微信公众号链接
                  if "mp.weixin.qq.com" in text:
                      print(f"发现新链接: {text}")
                      url = text.strip()
                      
                      # 2. 执行解析同步脚本
                      print(f"🚀 开始同步: {url}")
                      # 使用 sys.executable 确保使用相同的 python 解释器
                      # 使用 -y 参数开启自动确认
                      result = subprocess.run(
                          [sys.executable, "backend/cli.py", url, "-y"],
                          capture_output=True,
                          text=True
                      )
                      
                      # 3. 反馈结果给用户
                      if result.returncode == 0:
                          status_msg = f"✅ 同步成功！\n解析到戏讯数据已更新到飞书。"
                      else:
                          # 捕获错误详情并反馈
                          err_info = result.stderr or result.stdout
                          status_msg = f"❌ 同步失败！\n错误详情: {err_info[:500]}..." if len(err_info) > 500 else f"❌ 同步失败！\n错误详情: {err_info}"
                      
                      requests.post(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage", 
                          data={"chat_id": chat_id, "text": status_msg}
                      )
                      
                      # 4. 标记消息已处理 (通过 offset 让下次获取不再出现此条)
                      requests.get(f"https://api.telegram.org/bot{TOKEN}/getUpdates", params={"offset": update_id + 1})
          else:
              print("暂无新消息待处理。")
          EOF
