name: Telegram 戏讯解析同步

on:
  schedule:
    # 每 1 小时检查一次机器人消息 (GitHub 定时任务，节省额度且稳定)
    - cron: '0 * * * *'
  workflow_dispatch:
    # 允许手动触发测试

jobs:
  check-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: 获取项目代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install requests

      - name: 🤖 检查并处理 Telegram 消息
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python << 'EOF'
          import os
          import requests
          import subprocess
          import json
          import sys

          TOKEN = os.getenv("TG_TOKEN")
          
          def send_msg(chat_id, text):
              try:
                  url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"
                  res = requests.post(url, data={"chat_id": chat_id, "text": text}, timeout=10).json()
                  return res
              except Exception as e:
                  print(f"发送消息失败: {e}")
                  return {}

          def edit_msg(chat_id, message_id, text):
              try:
                  url = f"https://api.telegram.org/bot{TOKEN}/editMessageText"
                  res = requests.post(url, data={"chat_id": chat_id, "message_id": message_id, "text": text}, timeout=10).json()
                  return res
              except Exception as e:
                  print(f"编辑消息失败: {e}")
                  return {}

          # 1. 获取消息
          print("正在拉取待处理消息...")
          try:
              resp = requests.get(f"https://api.telegram.org/bot{TOKEN}/getUpdates", timeout=10).json()
          except Exception as e:
              print(f"获取更新失败: {e}")
              sys.exit(0)
              
          results = resp.get("result", [])
          print(f"收到 {len(results)} 条待处理记录。")

          if results:
              for update in results:
                  update_id = update["update_id"]
                  message = update.get("message", {})
                  text = message.get("text", "")
                  chat_id = message.get("chat", {}).get("id")
                  
                  if text and "mp.weixin.qq.com" in text:
                      url_target = text.strip()
                      print(f"🎯 处理链接: {url_target}")
                      
                      # --- 状态优化：立刻给用户反馈 ---
                      status_resp = send_msg(chat_id, f"⌛ 发现戏讯链接，正在解析同步到飞书，请稍候...\n\n🔗 {url_target}")
                      msg_id = status_resp.get("result", {}).get("message_id")
                      
                      # 2. 执行解析同步
                      result = subprocess.run(
                          [sys.executable, "backend/cli.py", url_target, "-y"],
                          capture_output=True, text=True
                      )
                      
                      # 3. 更新反馈消息 (Edit Message)
                      if result.returncode == 0:
                          final_text = f"✅ 同步成功！\n数据已解析并更新至飞书多维表格。\n\n🔗 {url_target}"
                      else:
                          err_info = result.stderr or result.stdout
                          final_text = f"❌ 同步失败！\n\n原因: {err_info[:200]}...\n\n🔗 {url_target}"
                      
                      if msg_id:
                          edit_msg(chat_id, msg_id, final_text)
                      else:
                          send_msg(chat_id, final_text)
                      
                      # 4. 确认消息已读 (通过 offset)
                      requests.get(f"https://api.telegram.org/bot{TOKEN}/getUpdates", params={"offset": update_id + 1})
          else:
              print("暂无新消息。")
          EOF
